ss_REG_MagPlot_CODE_1: "def mag_dist(acc_v: np.ndarray):\n    \"\"\"\n    :param acc_v:\
  \ Time series of acceleration\n    :return: magnitude of acceleration vector\n \
  \   \"\"\"\n    # ensure exactly one dimension is 3\n    if 3 not in acc_v.shape:\n\
  \        raise ValueError(\"Input must have one dimension equal to 3\")\n\n    #\
  \ orient as (N, 3)\n    if acc_v.shape[1] == 3:\n        v2 = acc_v\n    else: \
  \ # shape must be (3, N)\n        v2 = acc_v.T\n\n    return np.linalg.norm(v2,\
  \ axis=1)\n\n\ndef plot_mag_acc(time: np.ndarray, acc_v: np.ndarray, xlabel: str,\
  \ ylabel: str, label_str: str,\n                 title=\"Generic title\", filename=\"\
  Generic_filename.png\"):\n    \"\"\"\n    Args:\n        :param filename:\n    \
  \    :param title:\n        :param label_str:\n        :param ylabel:\n        :param\
  \ xlabel:\n        :param acc_v:\n        :param time:\n    :returns: str(filename)\n\
  \    \"\"\"\n    # --- 3. Figure Setup ---\n    max_time = np.nanmax(time)\n   \
  \ orbital_lines = []\n    # Calculate lines\n    if period is not None and max_time\
  \ > period:\n        orbital_lines = np.arange(period, max_time + 1, period, dtype=float)\n\
  \        fig, ax = plt.subplots(figsize=(8 + len(orbital_lines), 8))  # Increased\
  \ height for legend\n    else:\n        fig, ax = plt.subplots(figsize=(8, 7)) \
  \ # Increased height\n\n    fig.subplots_adjust(top=0.82)  # Room for legend\n\n\
  \    acc = errors.mag_dist(acc_v)\n\n    plt.plot(time, acc, linewidth=2, label=label_str)\
  \  # Added label here for legend\n\n    plt.xlabel(xlabel, fontsize=LABEL_SIZE)\n\
  \    plt.ylabel(ylabel, fontsize=LABEL_SIZE)\n    ax.set_title(title, fontsize=TITLE_SIZE,\
  \ y=1.20)\n    plt.grid(True, linestyle=':', alpha=0.6)\n\n    ax.tick_params(labelsize=TICK_SIZE)\n\
  \    # Turn on minor ticks\n    ax.xaxis.set_minor_locator(mticker.AutoMinorLocator())\n\
  \    ax.yaxis.set_minor_locator(mticker.AutoMinorLocator())\n    # ax.legend(loc='best',\
  \ fontsize=LEGEND_SIZE)\n\n    # --- Orbital Period Lines ---\n    if 'period' in\
  \ globals() and period is not None and len(orbital_lines) > 0:\n        for lx in\
  \ orbital_lines:\n            ax.axvline(lx, color='black', linestyle='-.', alpha=0.3,\
  \ zorder=0)\n            ax.text(lx, 1.05, f\"{int(lx / period)} T \u2248 {int(lx)}\
  \ s\",\n                    transform=ax.get_xaxis_transform(),\n              \
  \      ha='center', va='bottom', fontsize=12, color='gray')\n\n    # --- ADD ORBITAL\
  \ PERIOD LABEL ---\n    handles, labels = ax.get_legend_handles_labels()\n    handles.append(Line2D([0],\
  \ [0], color='none', label='1T = one orbital period'))\n    labels.append('1T =\
  \ one orbital period')\n\n    # Legend ABOVE axis\n    ax.legend(handles, labels,\
  \ loc='lower center', bbox_to_anchor=(0.5, 1.08),\n              ncol=2, fontsize=LEGEND_SIZE)\n\
  \n    plt.tight_layout()\n    plt.savefig(filename, dpi=300, bbox_inches=\"tight\"\
  )\n    plt.close(fig)\n    return str(filename)\n"
