ss_REG_J2_CODE_2.5: "def j2_acc(r):\n    # Parameters:\n    mu_earth = pick(\"mu_E\"\
  )\n    R_earth = pick(\"R_E\")\n    J2 = pick(\"J_2\")\n\n    x, y, z = r\n    r_norm\
  \ = np.linalg.norm(r)\n    a_x = -3 / 2 * mu_earth * J2 * R_earth ** 2 / r_norm\
  \ ** 5 * x * (1 - 5 * z ** 2 / r_norm ** 2)\n    a_y = -3 / 2 * mu_earth * J2 *\
  \ R_earth ** 2 / r_norm ** 5 * y * (1 - 5 * z ** 2 / r_norm ** 2)\n    a_z = -3\
  \ / 2 * mu_earth * J2 * R_earth ** 2 / r_norm ** 5 * z * (3 - 5 * z ** 2 / r_norm\
  \ ** 2)\n    a = np.array([a_x, a_y, a_z])\n\n    return a\n"
