ss_REG_OrbKepRes_CODE_2: "def kep_el_and_residuals(state_u, time_u,\n            \
  \             state_d, time_d,\n                         label_u, ylabel_u,\n  \
  \                       label_d, ylabel_d,\n                         label_diff,\
  \ ylabel_diff,\n                         fig_title, fig_name, plot=True):\n    #\
  \ Retrieve Keplerian elements\n    if not np.array_equal(time_u, time_d):\n    \
  \    raise RuntimeError(\"The two orbits have different time domains, residuals\
  \ cannot be computed.\")\n    a_u, e_u, _, i_u, _, Om_u, _, om_u, _, th_u, u_u =\
  \ cartesian_to_keplerian(state_u)\n    a_d, e_d, _, i_d, _, Om_d, _, om_d, _, th_d,\
  \ u_d = cartesian_to_keplerian(state_d)\n    da = a_d - a_u\n    de = e_d - e_u\n\
  \    di = i_d - i_u\n    dOm = Om_d - Om_u\n    dom = om_d - om_u\n    dth = th_d\
  \ - th_u\n    du = u_d - u_u\n    # kep_el_u = np.column_stack((a_u, e_u, i_u, Om_u,\
  \ om_u, th_u, u_u))\n    # kep_el_d = np.column_stack((a_d, e_d, i_d, Om_d, om_d,\
  \ th_d, u_d))\n    #\n    # kep_el_diff = np.column_stack((da, de, di, dOm, dom,\
  \ dth, du))\n    kep_el_u = np.column_stack((a_u, e_u, i_u, Om_u, u_u))\n    kep_el_d\
  \ = np.column_stack((a_d, e_d, i_d, Om_d, u_d))\n    kep_el_diff = np.column_stack((da,\
  \ de, di, dOm, du))\n    generated_files = []\n\n    if plot:\n        for i in\
  \ range(5):\n            # Extract data\n            u_data = kep_el_u[:, i]\n \
  \           d_data = kep_el_d[:, i]\n            diff_data = kep_el_diff[:, i]\n\
  \n            # Handle Angle Wrapping for Omega (idx 3) and omega (idx 4)\n    \
  \        if i in [3, 4]:\n                u_data = mask_discontinuity(u_data)\n\
  \                d_data = mask_discontinuity(d_data)\n                # diff data\
  \ usually doesn't need masking if it's small residuals,\n                # but if\
  \ it jumps due to wrapping, we might need it.\n                # For residuals,\
  \ we usually don't wrap them to 0-360, they are small deltas.\n                #\
  \ diff_data = mask_discontinuity(diff_data)\n\n            # Handle filename list\
  \ or single pattern\n            # If 'filename' is a list, pick i-th. If string,\
  \ append _i\n            fname = fig_name[i] if isinstance(fig_name, list) else\
  \ f\"{fig_name}_{i}.png\"\n            tit = fig_title[i] if isinstance(fig_title,\
  \ list) else f\"{fig_title} - Element {i}\"\n\n            # Call the plotter\n\
  \            out = plot_comparison_residual(\n                time_u,\n        \
  \        u_data, label_u[i],\n                d_data, label_d[i],\n            \
  \    diff_data, label_diff[i],\n                ylabel_u[i], ylabel_diff[i],  #\
  \ Main Y-label matches the elements\n                title=tit,\n              \
  \  filename=fname\n            )\n            # generated_files.append(out)\n\n\
  \    return kep_el_u, kep_el_d, kep_el_diff\n\n\ndef plot_comparison_residual(time,\n\
  \                             data_u, label_u,\n                             data_d,\
  \ label_d,\n                             data_diff, label_diff,\n              \
  \               ylabel_main, ylabel_diff,\n                             title=\"\
  Comparison\", filename=\"comp_plot.png\"):\n    \"\"\"\n    Plots Disturbed and\
  \ Undisturbed on Left Axis, Residual on Right Axis.\n    \"\"\"\n    # --- Setup\
  \ & Figure Size ---\n    max_time = np.nanmax(np.array(time)) if len(time) > 0 else\
  \ 0\n    orbital_lines = []\n\n    # Calculate lines\n    if period is not None\
  \ and max_time > period:\n        orbital_lines = np.arange(period, max_time + 1,\
  \ period, dtype=float)\n        fig, ax1 = plt.subplots(figsize=(8 + len(orbital_lines),\
  \ 8))\n    else:\n        fig, ax1 = plt.subplots(figsize=(8, 7))\n\n    fig.subplots_adjust(top=0.82)\n\
  \n    # Colors matching plot_three_scales\n    color_u = 'tab:blue'\n    color_d\
  \ = 'tab:green'\n    color_diff = 'tab:orange'  # Changed to orange to match 3rd\
  \ axis of plot_three_scales\n\n    # --- Axis 1 (Left) - Main Values (Unperturbed\
  \ & Perturbed) ---\n    # Plot Undisturbed\n    l1, = ax1.plot(time, data_u, color=color_u,\
  \ label=label_u, linestyle='--', linewidth=5, alpha=1)\n    # Plot Disturbed\n \
  \   l2, = ax1.plot(time, data_d, color=color_d, label=label_d, linestyle='-', linewidth=7,\
  \ alpha=0.5)\n\n    ax1.set_xlabel(\"Time [s]\", fontsize=LABEL_SIZE)\n    ax1.set_ylabel(ylabel_main,\
  \ fontsize=LABEL_SIZE)\n    ax1.tick_params(axis='y', labelsize=TICK_SIZE)\n   \
  \ ax1.tick_params(axis='x', labelsize=TICK_SIZE)\n    ax1.grid(True, which='major',\
  \ linestyle=':', alpha=0.6)\n\n    # Move Scientific Notation (Offset Text) FAR\
  \ LEFT\n    ax1.yaxis.get_offset_text().set_horizontalalignment('right')\n    ax1.yaxis.get_offset_text().set_position((-0.15,\
  \ 1.0))\n    ax1.xaxis.set_minor_locator(mticker.AutoMinorLocator())\n    ax1.yaxis.set_minor_locator(mticker.AutoMinorLocator())\n\
  \n    # --- Axis 2 (Right) - Residual ---\n    ax2 = ax1.twinx()\n    l3, = ax2.plot(time,\
  \ data_diff, color=color_diff, label=label_diff, linestyle='-.', linewidth=6)\n\n\
  \    ax2.set_ylabel(ylabel_diff, color=color_diff, fontsize=LABEL_SIZE)\n    ax2.tick_params(axis='y',\
  \ labelcolor=color_diff, labelsize=TICK_SIZE)\n\n    # Configure Right Axis (Scientific\
  \ notation if needed)\n    formatter = mticker.ScalarFormatter(useMathText=True)\n\
  \    formatter.set_powerlimits((-3, 2))\n    ax2.yaxis.set_major_formatter(formatter)\n\
  \    ax2.yaxis.get_offset_text().set_x(1.1)\n    ax2.yaxis.set_minor_locator(mticker.AutoMinorLocator())\n\
  \n    # --- Orbital Period Lines ---\n    if 'period' in globals() and period is\
  \ not None and len(orbital_lines) > 0:\n        for lx in orbital_lines:\n     \
  \       ax1.axvline(lx, color='black', linestyle='-.', alpha=0.4, zorder=0)\n  \
  \          ax1.text(lx, 1.02, f\"{int(lx / period)} T \u2248 {int(period * (lx /\
  \ period))} [s]\",\n                     transform=ax1.get_xaxis_transform(),\n\
  \                     ha='center', va='bottom', fontsize=12, color='gray')\n\n \
  \   # --- Legend & Title ---\n    lines = [l1, l2, l3]\n    labels = [l.get_label()\
  \ for l in lines]\n\n    # --- ADD ORBITAL PERIOD LABEL ---\n    lines.append(Line2D([0],\
  \ [0], color='none', label='1T = one orbital period'))\n    labels.append('1T =\
  \ one orbital period')\n\n    # Legend at Top\n    ax1.legend(lines, labels, loc='lower\
  \ center', bbox_to_anchor=(0.5, 1.05),\n               ncol=2, borderaxespad=0.,\
  \ frameon=True, fontsize=LEGEND_SIZE)\n\n    ax1.set_title(title, y=1.18, fontsize=TITLE_SIZE)\n\
  \n    # --- Save ---\n    try:\n        fig.savefig(filename, bbox_inches=\"tight\"\
  )\n    except ValueError:\n        print(f\"Warning: Infinite data detected in {filename}.\
  \ Saving without 'tight' layout.\")\n        fig.savefig(filename)\n\n    plt.close(fig)\n\
  \    return str(filename)\n"
