ss_AEX_TBP_CODE_0.8: "def tbp_acc(r, r_sun, r_moon):\n    # 3x1 acceleration due to\
  \ Sun+Moon\n\n    mu_s = pick(\"mu_S\")\n    mu_m = pick(\"mu_M\")\n\n    x, y,\
  \ z = r\n    x_s, y_s, z_s = r_sun\n    x_m, y_m, z_m = r_moon\n\n    # i = satellite,\
  \ k = Earth, m = Moon, s = Sun\n    r_is = np.sqrt((x_s - x) ** 2 + (y_s - y) **\
  \ 2 + (z_s - z) ** 2)\n    r_ks = np.sqrt(x_s ** 2 + y_s ** 2 + z_s ** 2)\n\n  \
  \  r_im = np.sqrt((x_m - x) ** 2 + (y_m - y) ** 2 + (z_m - z) ** 2)\n    r_km =\
  \ np.sqrt(x_m ** 2 + y_m ** 2 + z_m ** 2)\n\n    # We consider both the perturbation\
  \ of the Moon and of the Sun\n    ax_s = mu_s * ((x_s - x) / r_is ** 3 - x_s / r_ks\
  \ ** 3)\n    ay_s = mu_s * ((y_s - y) / r_is ** 3 - y_s / r_ks ** 3)\n    az_s =\
  \ mu_s * ((z_s - z) / r_is ** 3 - z_s / r_ks ** 3)\n\n    ax_m = mu_m * ((x_m -\
  \ x) / r_im ** 3 - x_m / r_km ** 3)\n    ay_m = mu_m * ((y_m - y) / r_im ** 3 -\
  \ y_m / r_km ** 3)\n    az_m = mu_m * ((z_m - z) / r_im ** 3 - z_m / r_km ** 3)\n\
  \n    a = np.array([ax_s + ax_m, ay_s + ay_m, az_s + az_m])\n\n    return a\n"
