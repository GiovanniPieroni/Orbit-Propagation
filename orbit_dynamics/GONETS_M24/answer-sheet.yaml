ss_REG_SRPObs_OIC_6: " (I will refer to the orbit integrated including the SRP perturbation\
  \ as 'SRP-perturbed orbit')\n|\n- O1: Plot \"a_mag_SRP.png\" shows that the magnitude\
  \ of the acceleration due to solar radiation pressure forms a rectangular\n  wave\
  \ pattern, with values alternating between a maximum of about 9e-5 mm/s^2 and zero.\
  \ Over each orbital period,\n  the acceleration is non-zero for most of the time\
  \ interval. \n- O2: Plot \"a_e_i_res_SRP_U.png\" shows the residuals in semi-major\
  \ axis, eccentricity and inclination between the\n  unperturbed orbit and the SRP-perturbed\
  \ orbit. \u0394e shows a negative piecewise drift with values of order 1e-7, while\
  \ \u0394i shows\n  a positive piecewise drift with values of order 1e-6 deg. \u0394\
  a exhibits a near-periodic pattern with no visible drift, reaching a\n  maximum\
  \ amplitude of approximately 35 cm every orbital period. In all cases, intervals\
  \ of nearly constant residuals \n  alternate with intervals of non-constant residuals.\n\
  - O3: Plot \"specific_energy_SRP.png\" shows that the specific energy of the perturbed\
  \ orbit alternates between intervals where\n  it is constant and intervals where\
  \ it is non-constant. During the non-constant intervals, the specific energy increases\
  \ to a\n  maximum value (less negative), with variations of order 1e-6 km^2/s^2,\
  \ and returns to the minimum plateau. No secular drift is visible. \n"
ss_REG_SRPInt_OIC_8: "|\n- I1: From O1 and O2, the acceleration trend causes the residuals\
  \ to exhibit piecewise behaviour because, when the \n  perturbation due to SRP is\
  \ zero, the orbital dynamics are governed only by the point-mass gravitational model,\
  \ and \n  the Keplerian elements therefore remain practically constant.\n- I2: From\
  \ O2 and O3, the semi-major axis exhibits bounded, near-periodic variations because\
  \ the specific orbital \n  energy varies periodically without a secular drift over\
  \ the considered time interval, and the two quantities are\n  directly related through\
  \ \u03B5 = \u2212\u03BC/(2a).\n"
ss_REG_SRPCon_OIC_10: "|\n- The inclusion of the perturbation due to SRP, although\
  \ the associated force is\n  non-conservative, introduces secular drifts only in\
  \ eccentricity and inclination (between the analyzed Keplerian\n  elements). Instead,\
  \ for the considered time interval (only a few orbital periods) it produces short-period\
