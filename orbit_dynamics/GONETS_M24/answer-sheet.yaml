ss_AEX_TBPObs_OIC_1: "|\n- O1: Plot \"a_mag_TBP.png\" shows that |a_TBP| varies periodically\
  \ between about 9e-4 and ~1.5e-3 mm/s^2; during each \n  orbital period, two local\
  \ maxima and minima are present.\n- O2: Plot \"a_TBP_RSW.png\" shows that the Radial,\
  \ Along-track and Cross-track components have different dominant periods:\n  a_W\
  \ completes about one cycle per orbit, while a_R and a_S complete about two cycles\
  \ per orbit.\n- O3: Plot \"GPD_TBP_SunMoonDist.png\" shows that GPD_{d-u} increases\
  \ to about 35 m after five orbital periods,\n  with oscillations superimposed; in\
  \ the same plot, |r_{m-sat}| and |r_{s-sat}| reach their local maxima/minima approximately\
  \ at the\n  same times (their oscillations are nearly in phase).\n"
ss_AEX_TBPInt_OIC_2: "|\n- I1: From O3, the non-zero final GPD indicates that the\
  \ third-body perturbation does not result in a purely periodic\n  displacement that\
  \ cancels after each revolution. Even though gravity is conservative, the third-body\
  \ term modifies the\n  satellite\u2019s trajectory relative to the two-body (Earth-only)\
  \ reference, so small orbit-to-orbit mismatches accumulate\n  over time, producing\
  \ a growing separation with superimposed short-period oscillations.\n- I2: From\
  \ O1 and O2, the ~2-per-orbit pattern in |a_TBP| and in the in-plane components\
  \ (a_R and a_S) is caused by\n  the tidal nature of third-body gravity: the perturbation\
  \ depends on the satellite\u2019s alignment with the Earth\u2013third-body\n  direction\
  \ and is strongest when the satellite is approximately collinear with that direction\
  \ (both on the near side and\n  on the far side), and weakest near quadrature. This\
  \ geometry repeats every half orbit, which yields two extrema per\n  orbital period;\
  \ in addition, the radial projection can keep the same sign in both collinear configurations\
  \ because both\n  the tidal acceleration and the radial unit vector reverse together\
  \ on opposite sides of the orbit.\n"
ss_AEX_TBPCon_OIC_4: "|\n- For short periods of integration, and assuming a constant\
  \ position of the third body, the disturbance is approximately \n  a static tidal\
  \ field; in that regime, the dominant short-period signature in the orbital-plane\
  \ components typically\n  repeats every half orbit (i.e., has a twice-per-orbit\
  \ harmonic), while the out-of-plane component is typically \n  dominated by a 1-per-orbit\
  \ term.\n"
ss_CEX_Explain_GEN_10: "|\n- Developed a robust TLE caching and retrieval system with\
  \ fallback logic, local storage, NORAD/name matching, \nmalformed-response handling,\
  \ and incremental caching.\n- The code is structured in files with functions for\
  \ specific or general tasks.\n- Vectorised the CartoKep and KeptoCar transformation,\
  \ eliminating loops.\n- Built reusable plotting functions including matrix-based\
  \ plotting and generic plotting interfaces.\n- Implemented a layered configuration\
  \ system (DEFAULTS -> CONFIG.yaml -> CLI arguments) with the `pick()` \nselector.\n"
