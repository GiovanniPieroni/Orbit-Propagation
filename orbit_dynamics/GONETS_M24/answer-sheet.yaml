ss_AEX_Drag_CODE_0.8: "def drag_acc(r, v):\n    # 3x1 acceleration due to drag, including\
  \ rotating atmosphere\n\n    # v is given in ECI => We need to remove Earth rotation\
  \ (assuming atmosphere fixed to it)\n    w_e = pick(\"w_E\")\n    w_e_vec = np.array([0,\
  \ 0, w_e])\n    v_a = v - np.linalg.cross(w_e_vec, r)  # type: ignore\n    B = pick(\"\
  ball_coeff\")\n    rho_mean = pick(\"ref_rho\")\n    v_a_norm = np.linalg.norm(v_a)\n\
  \    h = np.linalg.norm(r) - pick(\"R_E\")\n    rho = np.exp(-h/pick(\"scale_height\"\
  )) * rho_mean\n    a = - 1 / 2 * rho * B * v_a_norm * v_a\n\n    return a\n"
