ss_AEX_DragObs_OIC_1: "|\n- O1: Plot \"a_mag_Drag.png\" shows that the magnitude of\
  \ drag acceleration oscillates periodically between ~6.90\xD710^-8 and\n ~6.96\xD7\
  10^-8 mm/s^2, repeating approximately the same pattern over multiple orbits.\n-\
  \ O2: Plots \"a_Drag.png\" and \"u_Drag.png\" show that the residual \u0394a_d-u\
  \ decreases over time and reaches ~(-5)\xD710^-9 km \n  at the end of integration,\
  \ while \u0394u_d-u increases over time and reaches ~9\xD710^-10 deg.\n- O3: Plots\
  \ \"i_Drag.png\" and \"RAAN_Drag.png\" show that i_u and i_d are practically coincident\
  \ and \u0394i_d-u drops to \n  ~(-8)\xD710^-13 deg; also RAAN_u and RAAN_d are visibly\
  \ coincident and \u0394RAAN_d-u remains confined about within \n  \xB16\xD710^-14\
  \ deg with no clear trend.\n"
ss_AEX_DragInt_OIC_2: "|\n- I1: From O1, the periodic oscillation of |a_drag| is consistent\
  \ with the dependence of the drag on \u03C1(h) and |v_rel|^2; along\n  the orbit\
  \ these terms oscillate and thus the magnitude of the perturbation also varies with\
  \ approximately orbital periodicity.\n- I2: From O2 and O3, the fact that drift\
  \ is observed on a and u, but not on i and RAAN, is consistent with a perturbation\n\
  \  mainly in-plane (or along-track): it reduces the orbital energy (decrease in\
  \ a, E becomes more negative) and cumulatively\n  changes the orbital phase (growth\
  \ of \u0394u), while producing a negligible contribution on the orbital plane.\n"
ss_AEX_DragCon_OIC_4: "|\n- For relatively short integration periods (between two\
  \ and seven orbital periods), atmospheric-drag perturbations tend to be most\n \
  \ apparent in in-plane quantities, while out-of-plane quantities remain negligible\
  \ unless the spacecraft\n  aerodynamics introduce a sustained out-of-plane component\
  \ (e.g., non-spherical shape or attitude-dependent lift). For a spherical satellite\n\
  \  with purely drag-like acceleration, orbital plane variations are therefore expected\
  \ to stay near to machine precision \n  values.\n"
