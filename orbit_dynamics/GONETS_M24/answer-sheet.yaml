ss_REG_J2Obs_OIC_6: " (I will refer to the orbit propagated with the SGP4 model as\
  \ 'SGP4 orbit' and to the orbit integrated including the J2 perturbation as 'J2-perturbed\
  \ orbit')\n| \n- O1: Plot \"a_e_i_res_J2_SGP4.png\" shows the residuals in semi-major\
  \ axis, eccentricity and inclination between the SGP4 \nand the J2-perturbed orbits.\
  \ \u0394a oscillates and reaches a maximum amplitude of about 0.056 km, while \u0394\
  e and \u0394i remain of \nthe order of 1e-5, although \u0394i shows an increasing\
  \ oscillation amplitude. In the plot \"a_e_i_RK4.png\", the mean values \nof these\
  \ Keplerian elements (respectively a, e, and i) are approximately 7878 km, 6.56e-4,\
  \ and 82.5 deg.\n- O2: Plot \"a_J2.png\" shows that the semi-major axis of the J2-perturbed\
  \ orbit oscillates between approximately\n7862.5 and 7877.5 km, with a maximum separation\
  \ of approximately 16 km with respect to the unperturbed orbit, \nreached twice\
  \ every orbital period.\n- O3: Plot \"a_mag_J2.png\" shows that the magnitude of\
  \ the acceleration due to the J2 perturbation follows a periodic \npattern with\
  \ values bounded between approximately 6 and 13 mm/s^2; two local maxima around\
  \ 13 mm/s^2 occur per orbital period.\n"
ss_REG_J2Int_OIC_8: "|\n- I1: From O1, the residuals between the SGP4 and the J2-perturbed\
  \ orbits are small compared to the absolute values \nof the corresponding orbital\
  \ elements because, over the considered time span, for the Keplerian elements analysed,\
  \ and \nfor this orbit, the perturbation due to J2 represents a dominant contribution\
  \ included in the SGP4 propagation model.\n- I2: From O2 and O3, the semi-major\
  \ axis of the orbit perturbed by J2 oscillates periodically because the flattening\
  \ \nof the Earth introduces a latitude-dependent gravitational potential. Specifically,\
  \ this causes alternating increases and \ndecreases in the force (and hence velocity,\
  \ orbital energy) experienced by the satellite. The semi-major axis follows \nthe\
  \ resulting variation in orbital energy, leading to two extrema per orbital period.\n"
ss_REG_J2Con_OIC_10: "|\nFor short integration periods and first-order analyses, adding\
  \ the J2 perturbation to the gravitational point-mass \nmodel yields values for\
  \ the semi-major axis, eccentricity, and inclination that are comparable to those\
  \ obtained \nthrough SGP4 propagation. Additionally, the J2 perturbation causes\
  \ short-period variations in orbital energy, \nbut not secular variations. \n"
