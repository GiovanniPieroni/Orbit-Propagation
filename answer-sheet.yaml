ss_AEX_OptStep_OIC_3: "\n- O1: The plot ae_cgpd_vs_dt.png shows that CGPD decreases\
  \ rapidly as the time step is reduced from ~170 s to ~100 s \n      (dropping from\
  \ >300 m to ~40 m). However, for dt < 80 s, the curve flattens into a plateau, maintaining\
  \ a \n      nearly constant value between 20 m and 30 m regardless of further time\
  \ step reductions.\n\n- O2: The plot ae_totalCPU_and_cgpd_vs_dt.png (Pareto Front)\
  \ exhibits an asymptotic behavior: as the CGPD approaches the \n      floor, the\
  \ Total CPU Time increases non-linearly. Specifically, reducing the time step below\
  \ 80 s \n      increases the computational cost from ~5 s to >25 s, without yielding\
  \ visible reductions in CGPD.\n\n- O3: In ae_opt_metrics_vs_dt_additional.png, the\
  \ average time per call to the optimization function deviates from a strictly\n\
  \      linear inverse relationship (proportional to 1/dt) and visually evolves as\
  \ the plotted theoretical reference \n      curve dt^(-0.75).\n"
ss_AEX_OptStep_OIC_5: "\n- I1: Based on O1 and O2, the plateau in the CGPD and the\
  \ non-linear increase in total CPU time indicate that reducing\n      the integration\
  \ step below a certain threshold yields diminishing returns. This behavior occurs\
  \ because the \n      numerical truncation error (which depends on dt) becomes negligible\
  \ compared to the physical model mismatch. \n      Consequently, further reducing\
  \ dt increases the computational cost (as N increases) without improving the \n\
  \      solution.\n\n- I2: Based on O3, the trend of Avg Time/Call is not linearly\
  \ proportional to 1/dt (or N) due to the fixed \n      computational overhead of\
  \ the Python interpreter and memory allocation. This constant overhead becomes \n\
  \      significant relative to the integration time, masking the theoretical O(N)\
  \ complexity of the optimization algorithm, \n      and resulting in the observed\
  \ sub-linear scaling (~ N^0.75).\n"
ss_AEX_OptStep_OIC_6: "\nConclusion: The total error is bounded by the fidelity of\
  \ the dynamical model (physical accuracy floor), which cannot \n            be overcome\
  \ by numerical refinement alone. Therefore, decreasing the time step (dt) is effective\
  \ only \n            until the numerical truncation error drops below the physical\
  \ model mismatch error. The optimal strategy \n            is not to minimize dt\
  \ indefinitely, but to select the specific step size where numerical precision matches\
  \ \n            the physical model's accuracy limit, achieving Pareto efficiency\
  \ between computational cost and trajectory validity.\n"
ss_CEX_Explain_GEN_10: "\n- Developed a TLE caching and retrieval system with fallback\
