ss_REG_Opt_CODE_6: "def bfgs_search(\n        y0_nominal: np.ndarray,\n        dt:\
  \ float,\n        tf: float,\n        rhs,\n        r_sgp4: np.ndarray,\n      \
  \  initial_delta: np.ndarray,\n        epsilon=1e-4,\n) -> OptResults:\n    # SCALING:\
  \ 100m pos ~ 0.1 m/s vel\n    scale = np.array([0.1, 0.1, 0.1, 1e-4, 1e-4, 1e-4])\n\
  \n    x_k = initial_delta / scale\n\n    n_vars = len(initial_delta)\n    I = np.eye(n_vars)\n\
  \    H_k = np.eye(n_vars)\n\n    history_vals = []\n    history_grads = []\n   \
  \ history_times = []\n    n_calls = 0\n    t_start = pytime.perf_counter()\n\n \
  \   # Initial value\n    x_phys = x_k * scale\n    f_k, best_state, t_s = obj_mod.eval_objective_and_orbit(x_phys,\
  \ y0_nominal, dt, tf, rhs, r_sgp4)\n    n_calls += 1\n\n    # Initial gradient\n\
  \    g_k, t_g, c_g = compute_gradient_forward(x_k, f_k, epsilon, scale, y0_nominal,\
  \ dt, tf, rhs, r_sgp4)\n    n_calls += c_g\n\n    # Saving initial state\n    history_vals.append(f_k)\n\
  \    history_grads.append(np.linalg.norm(g_k))\n\n    # BFGS LOOP\n    max_iter\
  \ = 50\n\n    for k in range(max_iter):\n        if np.linalg.norm(g_k) < 1e-6:\n\
  \            break\n\n        p_k = -H_k @ g_k\n\n        if np.dot(p_k, g_k) >\
  \ 0:\n            H_k = I\n            p_k = -g_k\n\n        # --- LINE SEARCH ---\n\
  \        alpha = 1.0\n        c1 = 1e-4\n        rho = 0.2\n\n        accepted =\
  \ False\n        x_next = None\n        f_next = None\n        state_next = None\n\
  \n        for _ in range(15):\n            x_try = x_k + alpha * p_k\n         \
  \   x_try_phys = x_try * scale\n\n            f_try, s_try, t_try = obj_mod.eval_objective_and_orbit(x_try_phys,\
  \ y0_nominal, dt, tf, rhs, r_sgp4)\n            n_calls += 1\n            history_times.append(t_try)\n\
  \n            # Armijo Condition (+ tolerance for numerical noise)\n           \
  \ if f_try <= f_k + c1 * alpha * np.dot(g_k, p_k) + 1e-6:\n                accepted\
  \ = True\n                x_next = x_try\n                f_next = f_try\n     \
  \           state_next = s_try\n                break\n\n            alpha *= rho\n\
  \n        if not accepted:\n            break\n\n        g_next, t_g, c_g = compute_gradient_forward(x_next,\
  \ f_next, epsilon, scale, y0_nominal, dt, tf, rhs, r_sgp4)\n        n_calls += c_g\n\
  \n        s_k = x_next - x_k\n        y_k = g_next - g_k\n\n        sy = np.dot(y_k,\
  \ s_k)\n        if sy > 1e-10:\n            rho_k = 1.0 / sy\n            V = I\
  \ - rho_k * np.outer(s_k, y_k)\n            H_k = V @ H_k @ V.T + rho_k * np.outer(s_k,\
  \ s_k)\n\n        # Advance\n        x_k = x_next\n        f_k = f_next\n      \
  \  g_k = g_next\n        best_state = state_next\n\n        history_vals.append(f_k)\n\
  \        history_grads.append(np.linalg.norm(g_k))\n\n    total_time = pytime.perf_counter()\
  \ - t_start\n\n    return OptResults(\n        best_delta_y0=x_k * scale,\n    \
  \    best_value=float(f_k),\n        best_state=best_state,\n        history_values=history_vals,\n\
  \        history_grads=history_grads,\n        history_times=history_times,\n  \
  \      total_time=float(total_time),\n        n_calls=int(n_calls),\n    )\n"
