ss_REG_OrbObs_OIC_10: "\n- O1: The plot conv_cgpd_grad.png shows a rapid initial descent\
  \ of the objective function, dropping from > 2 km \n      to \u2248 500 m within\
  \ the first three iterations. The algorithm reaches the final plateau of \u2248\
  \ 300 m more slowly, \n      and CGPD values are essentially constant after the\
  \ 20th iteration, where the gradient norm remains well below 1e-2\n      and decreases\
  \ to values lower than 1e-6.\n\n- O2: In kep_res_u.png, the difference in the argument\
  \ of latitude (\u0394u) for the Integrated orbit shows a \n      monotonic increase\
  \ from 0 to \u2248 0.035 deg. In contrast, the Optimized orbit residual remains\
  \ bounded \n      within \xB1 0.005 deg and crosses zero twice, reaching its minimum\
  \ magnitude approximately at the midpoint \n      of the simulation time.\n\n- O3:\
  \ The plot mag_pos_diff.png shows that the Integrated position residual starts at\
  \ 0 km and diverges \n      monotonically to about \u2212 0.4 km. The Optimized\
  \ residual, instead, starts with a non-zero offset of \n      approximately + 0.2\
  \ km and decreases to \u2248 \u2212 0.2 km, crossing zero again approximately at\
  \ the\n      midpoint of the simulation time.\n\n- O4: The plots of the residuals\
  \ of the orbital elements (a, e, i, RAAN) show that the residuals between \n   \
  \   opt/SGP4 and int/SGP4 generally follow similar trends but are vertically offset\
  \ relative to each other. \n      None of the optimized element residuals are ~zero,\
  \ tend to zero or oscillate around zero.\n"
ss_REG_OrbInt_OIC_15: "\n- I1: Based on O1, the convergence behavior reflects the\
  \ geometry of the cost function. The sharp initial drop\n      indicates the algorithm\
  \ starting on a steep slope where large gradient magnitudes drive rapid improvements.\
  \ The \n      final plateau corresponds to the optimizer navigating the flatter\
  \ region near the local minimum, where the \n      gradient magnitude decreases,\
  \ requiring fine adjustments to satisfy the tolerance.\n\n- I2: Observations O2\
  \ and O3 indicate that the optimizer minimizes the RMS by converting a unilateral\
  \ divergence \n      (seen in the integrated orbit) into a bounded, symmetric error\
  \ distribution. Since the numerical model lacks \n      perturbation terms present\
  \ in SGP4 (e.g., drag), the optimizer compensates for the dynamic mismatch by \n\
  \      selecting an initial state with a bias. This forces the satellite to start\
  \ with a positive error, drift \n      through zero, and end with a negative error,\
  \ mathematically yielding a lower RMS than a function diverging from zero.\n"
ss_REG_OrbCon_OIC_23: "\nConclusion: When minimizing the RMS cumulative global position\
  \ difference between two dynamical models with different force formulations, \n\
  \            the optimal solution is a trajectory that centers the error distribution\
  \ around zero (symmetric deviation) \n            rather than matching the initial\
  \ conditions. Consequently, achieving a minimum RMS residual implies \n        \
  \    accepting a systematic bias in the orbital elements to compensate for the physical\
  \ model discrepancies \n            over the integration interval.\n"
