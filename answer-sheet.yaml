ss_REG_ObjFun_CODE_1: "def make_objective(\n    y0_nominal: np.ndarray,\n    dt: float,\n\
  \    tf: float,\n    rhs: Callable,\n    r_sgp4: np.ndarray,\n):\n    \"\"\"\n \
  \   Returns an objective function f(x) -> CGPD (meters)\n\n    The returned function\
  \ takes delta_y0 in [m, m/s] and returns\n    CGPD in meters.\n    \"\"\"\n    y0_nominal\
  \ = np.asarray(y0_nominal, dtype=float)\n    r_sgp4 = np.asarray(r_sgp4, dtype=float)\n\
  \n    def f(delta_y0: np.ndarray) -> float:\n        cgpd, _, _ = eval_objective_and_orbit(delta_y0,\
  \ y0_nominal, dt, tf, rhs, r_sgp4)\n        return cgpd\n\n    return f\n\n\ndef\
  \ eval_objective_and_orbit(\n    delta_y0: np.ndarray,\n    y0_nominal: np.ndarray,\n\
  \    dt: float,\n    tf: float,\n    rhs: Callable,\n    r_sgp4: np.ndarray,\n):\n\
  \    \"\"\"\n    Evaluate objective f(x) = CGPD between SGP4 orbit and integrated\
  \ orbit\n    with perturbed initial state.\n\n    Parameters\n    ----------\n \
  \   delta_y0 : (6,) array\n        Initial state perturbation [dx, dy, dz, dvx,\
  \ dvy, dvz] with\n        positions in meters, velocities in m/s.\n    y0_nominal\
  \ : (6,) array\n        Nominal initial state in km and km/s.\n    dt : float\n\
  \        Integration time step [s].\n    tf : float\n        Final time [s].\n \
  \   rhs : callable\n        RHS function for the ODE: rhs(t, y) -> dy/dt in km/s\
  \ and km/s^2.\n    r_sgp4 : (N+1, 3) array\n        SGP4 positions in km, on the\
  \ same time grid as the integrator.\n\n    Returns\n    -------\n    cgpd : float\n\
  \        CGPD in meters.\n    y_iter : (N+1, 6) array\n        Integrated state\
  \ (iterated orbit) in km and km/s.\n    t_step : float\n        CPU time for this\
  \ integration [s].\n    \"\"\"\n    delta_y0 = np.asarray(delta_y0, dtype=float)\n\
  \    if delta_y0.shape != (6,):\n        raise ValueError(f\"delta_y0 must be shape\
  \ (6,), got {delta_y0.shape}\")\n\n    y0_nominal = np.asarray(y0_nominal, dtype=float)\n\
  \    r_sgp4 = np.asarray(r_sgp4, dtype=float)\n\n    # Convert perturbations to\
  \ km and km/s\n    delta_pos_km = delta_y0[:3]\n    delta_vel_kms = delta_y0[3:]\n\
  \n    y0_pert = y0_nominal.copy()\n    y0_pert[:3] += delta_pos_km\n    y0_pert[3:]\
  \ += delta_vel_kms\n\n    # Integrate orbit with perturbed initial state\n    t_start\
  \ = pytime.perf_counter()\n    y_iter = integrator.RK4(y0_pert, dt, tf, rhs)\n \
  \   t_step = pytime.perf_counter() - t_start\n\n    # Positions for CGPD\n    r_iter\
  \ = y_iter[:, :3]\n    cgpd = cgpd_rms(r_sgp4, r_iter)\n\n    return cgpd, y_iter,\
  \ t_step\n\n\ndef cgpd_rms(r_ref: np.ndarray, r_test: np.ndarray) -> float:\n  \
  \  \"\"\"\n    Compute CGPD = RMS over time of the magnitude of the position difference.\n\
  \n    Parameters\n    ----------\n    r_ref : (N, 3) array\n        Reference positions\
  \ (SGP4) in km.\n    r_test : (N, 3) array\n        Test positions (integrated /\
  \ optimised) in km.\n\n    Returns\n    -------\n    float\n        CGPD in meters.\n\
  \    \"\"\"\n    r_ref = np.asarray(r_ref, dtype=float)\n    r_test = np.asarray(r_test,\
  \ dtype=float)\n\n    if r_ref.shape != r_test.shape:\n        raise ValueError(f\"\
  Shape mismatch in CGPD: ref {r_ref.shape}, test {r_test.shape}\")\n\n    diff =\
  \ r_test - r_ref\n    gpd = np.linalg.norm(diff, axis=1)  # km\n    # cgpd_km =\
  \ np.sqrt(np.mean(gpd**2))\n    n = gpd.size\n    cgpd_km = np.linalg.norm(gpd)\
  \ / np.sqrt(n)\n    return float(cgpd_km)  # km\n"
